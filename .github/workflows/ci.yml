name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - migration/customer-v2

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject committed API keys
        run: node scripts/check-secrets.mjs --history
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Lint (advisory until existing violations are resolved)
        continue-on-error: true
        run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
